name: ai-handoff

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  handoff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build handoff report
        id: report
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p tmp/ai-handoff

          EVENT_NAME="${{ github.event_name }}"
          REF_NAME="${{ github.ref_name }}"
          SHA_FULL="${{ github.sha }}"
          SHA_SHORT="$(printf '%s' "$SHA_FULL" | cut -c1-7)"
          AUTHOR="${{ github.actor }}"
          REPO="${{ github.repository }}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${{ github.run_id }}"

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" > tmp/ai-handoff/changed_files.txt
            CONTEXT_LINE="PR #${{ github.event.pull_request.number }}"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "${{ github.event.before }}" "${SHA_FULL}" > tmp/ai-handoff/changed_files.txt
            CONTEXT_LINE="Push on ${REF_NAME}"
          else
            git show --name-only --pretty="" "${SHA_FULL}" > tmp/ai-handoff/changed_files.txt
            CONTEXT_LINE="Manual run on ${REF_NAME}"
          fi

          if [[ ! -s tmp/ai-handoff/changed_files.txt ]]; then
            printf '%s\n' "(no changed files detected)" > tmp/ai-handoff/changed_files.txt
          fi

          {
            echo "## AI Handoff Report"
            echo
            echo "- Context: ${CONTEXT_LINE}"
            echo "- Commit: \`${SHA_SHORT}\`"
            echo "- Author: \`${AUTHOR}\`"
            echo "- Branch: \`${REF_NAME}\`"
            echo "- Workflow Run: ${RUN_URL}"
            echo
            echo "### Agent Roster"
            echo "- Atlas: 총괄+구현 ( planning, routing, implementation )"
            echo "- Codex App: 디자인 ( UI/UX, Figma )"
            echo "- Antigravity: 실제 사이트 QA ( staging/production validation )"
            echo
            echo "### Required Reading"
            echo "1. \`docs/ai-orchestra.md\`"
            echo "2. This report"
            echo "3. Relevant PR comments"
            echo "4. Changed files"
            echo
            echo "### Current Change Set"
            sed 's/^/- /' tmp/ai-handoff/changed_files.txt
            echo
            echo "### Handoff Rules"
            echo "- Use the standard template in \`docs/ai-handoff-template.md\`"
            echo "- Each agent must name a single next owner"
            echo "- QA findings must include repro steps"
            echo "- Dev handoff must include files touched and verification run"
            echo "- PM decides sequencing when agents disagree"
            echo
            echo "### Standard Template"
            echo '```md'
            cat docs/ai-handoff-template.md
            echo '```'
          } > tmp/ai-handoff/report.md

          export CONTEXT_LINE SHA_SHORT AUTHOR REF_NAME REPO RUN_URL
          python - <<'PY'
          import os
          from pathlib import Path

          changed_path = Path("tmp/ai-handoff/changed_files.txt")
          changed_files = [
              line.strip()
              for line in changed_path.read_text(encoding="utf-8").splitlines()
              if line.strip() and line.strip() != "(no changed files detected)"
          ]

          def pick_handoff_file(files: list[str]) -> str | None:
              candidates = [
                  path for path in files
                  if path.startswith("tmp/ai-handoff-latest/")
                  and path.endswith(".md")
                  and not path.endswith("report.md")
              ]
              if not candidates:
                  folder = Path("tmp/ai-handoff-latest")
                  if folder.exists():
                      candidates = [
                          str(path).replace("\\", "/")
                          for path in folder.glob("*.md")
                          if path.name != "report.md"
                      ]
              if not candidates:
                  return None
              candidates.sort(key=lambda path: ("charter" in path.lower(), path))
              return candidates[0]

          def parse_sections(text: str) -> dict[str, str]:
              sections: dict[str, list[str]] = {}
              current = None
              for line in text.splitlines():
                  if line.startswith("## "):
                      current = line[3:].strip()
                      sections[current] = []
                  elif current is not None:
                      sections[current].append(line)
              return {
                  key: "\n".join(value).strip()
                  for key, value in sections.items()
              }

          def compact(text: str, *, max_lines: int = 3) -> str:
              if not text:
                  return "없음"
              lines = [line.strip() for line in text.splitlines() if line.strip()]
              compacted = []
              for line in lines:
                  if line.startswith("- "):
                      compacted.append(f"• {line[2:].strip()}")
                  else:
                      compacted.append(line)
              if len(compacted) > max_lines:
                  compacted = compacted[:max_lines]
                  compacted.append("• ...(생략)")
              return "\n".join(compacted)

          handoff_file = pick_handoff_file(changed_files)
          sections = {}
          if handoff_file and Path(handoff_file).exists():
              sections = parse_sections(Path(handoff_file).read_text(encoding="utf-8"))

          task = compact(sections.get("Task", "이번 변경사항을 확인하고 다음 작업을 정리해 주세요."), max_lines=2)
          result = compact(
              sections.get("Result", f"변경 파일 {len(changed_files)}개가 감지되었습니다."),
              max_lines=4,
          )
          risks = compact(sections.get("Risks", "별도 리스크가 기록되지 않았습니다."), max_lines=3)
          next_owner = compact(sections.get("Next Owner", "미지정"), max_lines=1)
          next_action = compact(
              sections.get("Next Action", "워크플로우 실행 결과와 변경 파일을 확인해 다음 담당자를 지정해 주세요."),
              max_lines=2,
          )

          role_map = {
              "Atlas": "총괄+구현",
              "Codex App": "디자인",
              "Antigravity": "실제 사이트 QA"
          }
          current_agent = sections.get("Agent", "Atlas")
          current_role = role_map.get(current_agent, "AI")

          # Map status and result based on context
          status_tag = "완료"
          result_tag = "성공"
          
          if risks != "없음" and "리스크" not in risks:
              result_tag = "확인 필요"

          lines = [
              f"[{status_tag}] Busking Antigravity",
              f"- 담당 AI: {current_agent}",
              f"- 역할: {current_role}",
              f"- 작업 요약: {result}",
              f"- 환경: staging",
              f"- 결과: {result_tag}",
              f"- 검증: 빌드 및 리포트 생성 완료",
              f"- 링크: {os.environ['RUN_URL']}",
              f"- 다음 액션: {next_owner} - {next_action}",
          ]

          Path("tmp/ai-handoff/discord_message.txt").write_text(
              "\n".join(lines),
              encoding="utf-8",
          )
          PY

          echo "report_path=tmp/ai-handoff/report.md" >> "$GITHUB_OUTPUT"
          echo "discord_message_path=tmp/ai-handoff/discord_message.txt" >> "$GITHUB_OUTPUT"

      - name: Upload handoff artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-handoff-${{ github.run_number }}
          path: tmp/ai-handoff/report.md

      - name: Write workflow summary
        shell: bash
        run: cat "${{ steps.report.outputs.report_path }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportBody = fs.readFileSync(process.env.REPORT_PATH, 'utf8');
            const marker = '<!-- ai-handoff-report -->';
            const body = `${marker}\n${reportBody}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
        env:
          REPORT_PATH: ${{ steps.report.outputs.report_path }}

      - name: Send optional Discord notification
        if: env.DISCORD_WEBHOOK_URL != ''
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_MESSAGE_PATH: ${{ steps.report.outputs.discord_message_path }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          with open(os.environ["DISCORD_MESSAGE_PATH"], "r", encoding="utf-8") as f:
              message = f.read()

          payload = {
              "content": message
          }

          req = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "Codex-AI-Handoff/1.0",
              },
              method="POST",
          )
          urllib.request.urlopen(req).read()
          PY
