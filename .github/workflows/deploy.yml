name: Build and Deploy to Google Cloud Run

on:
  push:
    branches:
      - main # Trigger on push to main

env:
  PROJECT_ID: busking-488803 # Use actual GCP Project ID
  REGION: us-central1 # FREE TIER Region (Iowa) - Do not use asia-northeast3 if you want to avoid charges
  SERVICE_NAME: busking-app # Name of your Cloud Run service
  GAR_LOCATION: us-central1 # Artifact Registry region
  REPOSITORY: busking-images # Artifact Registry repository name

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Google Cloud CLI and authentication
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Use Service Account JSON or Workload Identity Federation
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}' 

      - name: 'Set up Cloud SDK'
        uses: google-github-actions/setup-gcloud@v2

      - name: 'Docker auth'
        run: |-
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev
          
      # Build the Docker image
      - name: Build Docker Image
        run: |-
          docker build \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }} \
            --build-arg NEXT_PUBLIC_CHAT_SERVER_URL=https://busking-chat-server-1073779064370.us-central1.run.app \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          
      # Push the image to Google Artifact Registry
      - name: Push Docker Image
        run: |-
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      # Deploy to Google Cloud Run
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          env_vars: |-
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NEXT_PUBLIC_CHAT_SERVER_URL=https://busking-chat-server-1073779064370.us-central1.run.app
            REDIS_URL=${{ secrets.REDIS_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          flags: '--allow-unauthenticated --port=3000'

      - name: Verify Deployment
        run: echo "Deployed URL - ${{ steps.deploy.outputs.url }}"
