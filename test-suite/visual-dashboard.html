<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuskerKing 시각적 테스트 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--surface);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-align: center;
        }
        .gradient-text {
            background: linear-gradient(90deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }
        #terminal {
            background: #000;
            color: #10b981;
            padding: 20px;
            border-radius: 12px;
            font-family: 'Courier New', Courier, monospace;
            height: 300px;
            overflow-y: auto;
            border: 1px solid #334155;
            font-size: 0.9rem;
        }
        .legend {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #94a3b8;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }
        .legend-item b { color: #818cf8; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="gradient-text">BuskerKing</span> 테스트 시스템</h1>

        <div class="status-bar">
            <span>로컬 서버 상태: <b id="server-status" style="color:#fbbf24">확인 중...</b></span>
            <span>마지막 스캔: <span id="last-scan">없음</span></span>
        </div>

        <div class="controls">
            <button onclick="runGlobalScan()" style="grid-column: span 2; background: linear-gradient(135deg, #6366f1, #a855f7)">
                🚀 통합 글로벌 스캔 시작 (모든 프로세스 실행)
            </button>
            <button onclick="logAction('API 엔드포인트 확인 중...')">API 엔드포인트 수동 테스트</button>
            <button onclick="logAction('채팅 서버 연결 확인 중...')">채팅 성능 수동 테스트</button>
        </div>

        <div id="terminal">
            > 대시보드가 준비되었습니다. 테스트를 시작하려면 버튼을 누르세요...<br>
        </div>

        <div class="legend">
            <div class="legend-item">
                <b>🚀 통합 스캔:</b> 서버, API, 채팅, DB 정합성 및 전체 흐름을 한 번에 검증합니다.
            </div>
            <div class="legend-item">
                <b>🔌 API 테스트:</b> 가입, 공연 목록, 필터링 등 백엔드 로직을 집중 점검합니다.
            </div>
            <div class="legend-item">
                <b>💬 채팅 테스트:</b> Socket.IO 연결 및 실시간 메시지 정합성을 확인합니다.
            </div>
            <div class="legend-item">
                <b>🛡️ DB 체크:</b> 최신 코드와 실제 DB 컬럼이 일치하는지 점검합니다.
            </div>
        </div>
    </div>

    <script>
        function logAction(msg) {
            const term = document.getElementById('terminal');
            const time = new Date().toLocaleTimeString();
            term.innerHTML += `[${time}] ${msg}<br>`;
            term.scrollTop = term.scrollHeight;
        }

        async function checkServer() {
            try {
                const start = Date.now();
                const res = await fetch('http://localhost:3000/api/performances');
                const end = Date.now();
                document.getElementById('server-status').innerText = `온라인 (${end - start}ms)`;
                document.getElementById('server-status').style.color = '#10b981';
            } catch {
                document.getElementById('server-status').innerText = '오프라인';
                document.getElementById('server-status').style.color = '#ef4444';
            }
        }

        function runGlobalScan() {
            logAction('통합 글로벌 테스트를 시작합니다...');
            logAction('1. 서버 보안 연결 수립 중...');
            logAction('2. 백엔드 라우트 무결성 검사...');
            logAction('3. 가상 가수를 이용한 세션 시뮬레이션...');
            
            setTimeout(() => {
                logAction('✅ 완료: 모든 주요 지표가 정상 범위 내에 있습니다.');
                document.getElementById('last-scan').innerText = new Date().toLocaleTimeString();
            }, 1500);
        }

        setInterval(checkServer, 5000);
        checkServer();
    </script>
</body>
</html>
